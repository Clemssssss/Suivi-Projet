<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableau détaillé</title>
  <style>
    :root {
      --bg: #08111d;
      --card: #101b2b;
      --card2: #162235;
      --rim: rgba(255,255,255,.08);
      --rim2: rgba(255,255,255,.12);
      --snow: #e8f1fb;
      --pale: #c5d3e1;
      --dust: #88a0b8;
      --brand: #00d4aa;
      --brand2: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(0,212,170,.12), transparent 26%),
        radial-gradient(circle at top right, rgba(56,189,248,.12), transparent 28%),
        var(--bg);
      color: var(--snow);
      font-family: Inter, system-ui, sans-serif;
    }
    .page {
      max-width: 1480px;
      margin: 0 auto;
      padding: 1.4rem;
    }
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .kicker {
      color: var(--brand);
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .12em;
      font-weight: 700;
      margin-bottom: .45rem;
    }
    h1 {
      margin: 0;
      font-size: 1.7rem;
      line-height: 1.15;
    }
    .subtitle {
      margin-top: .5rem;
      color: var(--dust);
      font-size: .95rem;
    }
    .actions {
      display: flex;
      gap: .6rem;
      flex-wrap: wrap;
    }
    .btn {
      appearance: none;
      border-radius: 10px;
      padding: .72rem .95rem;
      font-size: .82rem;
      border: 1px solid var(--rim2);
      cursor: pointer;
      background: rgba(255,255,255,.04);
      color: var(--snow);
    }
    .btn-primary {
      background: rgba(0,212,170,.12);
      border-color: rgba(0,212,170,.3);
      color: #8ff2dc;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      margin-bottom: 1rem;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      padding: .38rem .72rem;
      border-radius: 999px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      color: var(--pale);
      font-size: .75rem;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: .8rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .toolbar-actions {
      display: flex;
      gap: .6rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .search {
      flex: 1 1 340px;
      min-width: 280px;
      padding: .8rem .95rem;
      border-radius: 12px;
      border: 1px solid var(--rim2);
      background: rgba(255,255,255,.04);
      color: var(--snow);
      font-size: .9rem;
    }
    .search:focus { outline: none; border-color: rgba(0,212,170,.4); }
    .count {
      display: inline-flex;
      align-items: center;
      padding: .42rem .75rem;
      border-radius: 999px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      color: var(--dust);
      font-size: .78rem;
      white-space: nowrap;
    }
    .view-select {
      min-width: 260px;
      padding: .8rem .95rem;
      border-radius: 12px;
      border: 1px solid var(--rim2);
      background: rgba(255,255,255,.04);
      color: var(--snow);
      font-size: .88rem;
    }
    .view-select:focus {
      outline: none;
      border-color: rgba(0,212,170,.4);
    }
    .table-wrap {
      background: var(--card);
      border: 1px solid var(--rim);
      border-radius: 18px;
      overflow: auto;
      box-shadow: 0 18px 55px rgba(0,0,0,.28);
      max-height: calc(100vh - 240px);
    }
    table {
      width: 100%;
      min-width: 920px;
      border-collapse: separate;
      border-spacing: 0;
    }
    thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--card2);
      color: var(--dust);
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      text-align: left;
      padding: .85rem 1rem;
      border-bottom: 1px solid var(--rim2);
      cursor: pointer;
      white-space: nowrap;
    }
    thead tr.filter-row th {
      top: 47px;
      padding: .55rem .7rem;
      background: rgba(22,34,53,.98);
      border-bottom: 1px solid rgba(255,255,255,.08);
      cursor: default;
    }
    .sort-indicator {
      margin-left: .35rem;
      color: var(--brand);
      font-size: .74rem;
    }
    .column-filter {
      width: 100%;
      min-width: 120px;
      padding: .55rem .65rem;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: var(--snow);
      font-size: .78rem;
    }
    .column-filter:focus {
      outline: none;
      border-color: rgba(0,212,170,.4);
    }
    tbody td {
      padding: .82rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,.05);
      color: var(--pale);
      vertical-align: top;
    }
    tbody tr:nth-child(odd) td { background: rgba(255,255,255,.018); }
    tbody tr:hover td { background: rgba(0,212,170,.06); color: var(--snow); }
    .empty {
      padding: 2rem 1rem;
      text-align: center;
      color: var(--dust);
    }
    @media (max-width: 720px) {
      .page { padding: 1rem; }
      h1 { font-size: 1.3rem; }
      .table-wrap { max-height: calc(100vh - 220px); }
      .search { min-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div>
        <div class="kicker">Tableau détaillé</div>
        <h1 id="title">Aucun tableau chargé</h1>
        <div class="subtitle" id="subtitle">Ouvrez un tableau depuis le dashboard pour l’afficher ici.</div>
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="export-csv">Exporter CSV</button>
        <button class="btn" id="print-page">Imprimer</button>
      </div>
    </div>
    <div class="meta" id="meta"></div>
    <div class="toolbar">
      <input id="search" class="search" type="text" placeholder="Rechercher dans le tableau...">
      <div class="toolbar-actions">
        <select id="view-select" class="view-select" style="display:none;"></select>
        <button class="btn" id="reset-filters">Réinitialiser filtres</button>
        <div class="count" id="count">0 ligne</div>
      </div>
    </div>
    <div class="table-wrap">
      <table id="table">
        <thead>
          <tr id="thead-row"></tr>
          <tr id="filter-row" class="filter-row"></tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script src="js/table-view.js"></script>
</body>
</html>
