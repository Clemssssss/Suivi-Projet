<!DOCTYPE html>
<html lang="fr" style="color-scheme: dark;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logs d'accès</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,700;9..144,900&family=DM+Sans:wght@400;500;600&display=swap&display=swap" rel="stylesheet">
  <script src="js/AuthClient.js"></script>
  <style>
    body{margin:0;background:#08111d;color:#dce8f5;font-family:'DM Sans',system-ui,sans-serif;}
    .wrap{max-width:1200px;margin:0 auto;padding:1.2rem;}
    .card{background:rgba(15,23,35,.92);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:1rem 1rem 1.2rem;box-shadow:0 20px 60px rgba(0,0,0,.35);}
    .title{font-family:'Fraunces',serif;font-size:2rem;font-weight:900;color:#fff;}
    .title em{font-style:normal;color:#00d4aa;}
    .toolbar{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:.75rem;margin:1rem 0;}
    .toolbar input,.toolbar select,.toolbar button{width:100%;background:#0c1523;border:1px solid rgba(255,255,255,.08);color:#e8f4ff;border-radius:12px;padding:.8rem .9rem;font:inherit;}
    .toolbar button{cursor:pointer;background:rgba(0,212,170,.12);border-color:rgba(0,212,170,.34);color:#9ff3e1;font-weight:700;}
    .status{font-family:'DM Mono',monospace;color:#8ea6bc;font-size:.8rem;margin-bottom:.8rem;}
    .table-wrap{overflow:auto;}
    table{width:100%;border-collapse:collapse;min-width:980px;}
    th,td{padding:.7rem .75rem;border-bottom:1px solid rgba(255,255,255,.06);text-align:left;vertical-align:top;font-size:.82rem;}
    th{font-family:'DM Mono',monospace;font-size:.72rem;color:#8ea6bc;text-transform:uppercase;letter-spacing:.04em;}
    details summary{cursor:pointer;color:#9fd9ff;}
    pre{margin:.5rem 0 0;font-size:.72rem;color:#dce8f5;}
    .nav{display:flex;justify-content:space-between;align-items:center;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap;}
    .nav-actions{display:flex;align-items:center;gap:.55rem;flex-wrap:wrap;}
    .nav a,.nav button,.nav .pill{color:#00d4aa;text-decoration:none;font-family:'DM Mono',monospace;font-size:.8rem;background:#0c1523;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:.68rem .85rem;}
    .nav button{cursor:pointer;}
    .nav .pill{color:#9ff3e1;}
    @media (max-width:900px){.toolbar{grid-template-columns:1fr 1fr;}}
    @media (max-width:520px){.toolbar{grid-template-columns:1fr;}.title{font-size:1.55rem;}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="nav">
      <div class="title">Logs <em>d'accès</em></div>
      <div class="nav-actions">
        <span class="pill" id="auth-user-label">🔒 Session</span>
        <button id="btn-logout" type="button">Se déconnecter</button>
        <a href="/chart/whitelist.html">🛡️ Whitelist</a>
        <a href="/chart/chart.html">← Retour dashboard</a>
      </div>
    </div>
    <div class="card">
      <form id="logs-form" class="toolbar">
        <select id="logs-level">
          <option value="">Tous niveaux</option>
          <option value="info">info</option>
          <option value="warn">warn</option>
          <option value="error">error</option>
        </select>
        <input id="logs-type" type="text" placeholder="Type d'événement">
        <input id="logs-search" type="text" placeholder="Recherche utilisateur / IP / path">
        <select id="logs-limit">
          <option value="50">50 lignes</option>
          <option value="100" selected>100 lignes</option>
          <option value="200">200 lignes</option>
          <option value="300">300 lignes</option>
        </select>
        <button id="logs-refresh" type="submit">Rafraîchir</button>
      </form>
      <div class="status" id="logs-status">Prêt</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Niveau</th>
              <th>Événement</th>
              <th>Utilisateur</th>
              <th>IP</th>
              <th>Pays</th>
              <th>Path</th>
              <th>Détails</th>
            </tr>
          </thead>
          <tbody id="logs-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="js/logs-page.js"></script>
</body>
</html>
